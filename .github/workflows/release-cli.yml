name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            source: WpressExtractor.Cli.exe
            output: mytekki_wpressextractor_win_x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            source: WpressExtractor.Cli
            output: mytekki_wpressextractor_lin_deb_x64
          - os: macos-14
            rid: osx-x64
            source: WpressExtractor.Cli
            output: mytekki_wpressextractor_macos_intel_x64
          - os: macos-14
            rid: osx-arm64
            source: WpressExtractor.Cli
            output: mytekki_wpressextractor_macos_arm_x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish "WpressExtractor.Cli/WpressExtractor.Cli.csproj" -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp "WpressExtractor.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.source }}" "dist/${{ matrix.output }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  publish-nuget:
    name: Publish NuGet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack
        run: dotnet pack -c Release -o ./artifacts

      - name: Publish
        run: dotnet nuget push "artifacts/wpressextractor.cslibraries.apps.mytekki.com*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli, publish-nuget]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
